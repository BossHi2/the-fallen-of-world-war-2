<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&family=Texturina:ital,opsz,wght@0,12..72,100..900;1,12..72,100..900&display=swap" rel="stylesheet">
    
</head>
<body>
    <div id="page1" class="intro-wrapper pages page-opened">
        <h1 class="text texturina">Inspired by <a href="https://www.youtube.com/watch?v=DwKPFT-RioU">The Fallen of World War II</a></h1>
        <button class="texturina" onclick="changePages('page1', 'page2')">Begin Experience</button>
    </div>
    
    <div id="page2" class="pages" style="display: none;">
        <h1 class="text texturina" style="text-align: center;">The Deaths of the Leaders of WW2</h1>
        
        <div class="timeline">
            <div class="events">
                <div class="event-wrapper">
                    <svg class="marker" xmlns="http://www.w3.org/2000/svg" width="12" height="20">
                        <rect width="10" height="20"/>
                    </svg>      
                    
                    <div class="content">
                        <time class="text date"> 1945</time>
                        <div class="text">
                            <p>Franklin Roosevelt and Adolf Hitler</p>
                        </div>
                    </div>

                </div>

                <div class="event-wrapper">
                    <svg class="marker" xmlns="http://www.w3.org/2000/svg" width="12" height="20">
                        <rect width="10" height="20"/>
                    </svg>      
                    
                    <div class="content">
                        <time class="text date"> 1953</time>
                        <div class="text">
                            <p>Joseph Stalin</p>
                        </div>
                    </div>

                </div>

                <div class="event-wrapper">
                    <svg class="marker" xmlns="http://www.w3.org/2000/svg" width="12" height="20">
                        <rect width="10" height="20"/>
                    </svg>      
                    
                    <div class="content">
                        <time class="text date"> 1965</time>
                        <div class="text">
                            <p>Winston Churchill</p>
                        </div>
                    </div>

                </div>

                <div class="event-wrapper">
                    <svg class="marker" xmlns="http://www.w3.org/2000/svg" width="12" height="20">
                        <rect width="10" height="20"/>
                    </svg>      
                    
                    <div class="content">
                        <time class="text date"> 1976</time>
                        <div class="text">
                            <p>Mao Zedong</p>
                        </div>
                    </div>

                </div>

                <div class="event-wrapper">
                    <svg class="marker" xmlns="http://www.w3.org/2000/svg" width="12" height="20">
                        <rect width="10" height="20"/>
                    </svg>      
                    
                    <div class="content">
                        <time class="text date"> 1989</time>
                        <div class="text">
                            <p>Emperor Showa</p>
                        </div>
                    </div>

                </div>

                <div class="event-wrapper">
                    <svg class="marker" xmlns="http://www.w3.org/2000/svg" width="12" height="20">
                        <rect width="10" height="20"/>
                    </svg>      
                    
                    <div class="content">
                        <time class="text date"> 1972</time>
                        <div class="text">
                            <p>Harry Truman</p>
                        </div>
                    </div>

                </div>
            </div>

            
        </div>


        <div class="intro-wrapper">
            <h1 class="text texturina">Out of <span class="highlight">16.4 million</span> American WW2 veterans, only <span class="highlight">45,418</span> are still alive today.</h1>
        </div>
        
    </div>
    <script src="script.js"></script>
    
</body>
</html>
